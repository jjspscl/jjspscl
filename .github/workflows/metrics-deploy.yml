name: Deploy Metrics to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'metrics/**'
      - '.github/workflows/metrics-deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'metrics/**'
      - '.github/workflows/metrics-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: 🏗️ Build & Deploy Metrics Worker
    permissions:
      contents: read
      deployments: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            metrics
          sparse-checkout-cone-mode: false

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: metrics/package-lock.json

      - name: 📚 Install Dependencies
        working-directory: metrics
        run: npm ci

      - name: 🔍 Type Check
        working-directory: metrics
        run: npx tsc --noEmit

      - name: 🚀 Deploy to Cloudflare Workers
        if: github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: metrics
          command: deploy
